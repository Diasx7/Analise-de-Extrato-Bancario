<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Extrato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card-upload {
            max-width: 500px;
            margin: 100px auto;
        }
    </style>
</head>
<body>

<div class="card-upload card shadow p-4">
    <h3 class="mb-1">📊 Analisador de Extrato</h3>
    <p class="text-muted mb-4">Envie o CSV do seu banco e veja pra onde foi seu dinheiro.</p>

    <form action="/analisar" method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label fw-bold">Arquivo CSV do extrato</label>
            <input type="file" name="arquivo" accept=".csv" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Analisar</button>
    </form>

    <hr>
    <p class="text-muted small mb-0">
        💡 A maioria dos bancos permite exportar o extrato em CSV no app ou internet banking.
    </p>
</div>

</body>
</html>
